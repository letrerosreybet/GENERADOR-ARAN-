
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARAM | Luxury 3D Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;700;900&display=swap');
  
  :root {
    --luxury-black: #000000;
  }

  body { 
    font-family: 'Inter', sans-serif; 
    background: var(--luxury-black);
    color: #ffffff;
    -webkit-font-smoothing: antialiased;
  }

  .luxury-glass { 
    background: rgba(20, 20, 20, 0.7); 
    backdrop-filter: blur(50px); 
    -webkit-backdrop-filter: blur(50px); 
    border: 1px solid rgba(255, 255, 255, 0.05);
  }

  input[type="range"] {
    -webkit-appearance: none;
    height: 1px;
    background: rgba(255, 255, 255, 0.2);
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    background: #ffffff;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
  }

  .custom-scrollbar::-webkit-scrollbar { width: 3px; }
  .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
  .custom-scrollbar::-webkit-scrollbar-thumb { background: #333333; border-radius: 10px; }

  @keyframes border-spin {
    100% {
      transform: rotate(360deg);
    }
  }

  .animated-border-box {
    position: relative;
    border-radius: 1.5rem;
    overflow: hidden;
  }

  .animated-border-box::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: conic-gradient(from 0deg, transparent 0%, transparent 70%, #ffffff 100%);
    animation: border-spin 4s linear infinite;
    z-index: -2;
  }

  .animated-border-box::after {
    content: '';
    position: absolute;
    inset: 1px;
    background: rgba(10, 10, 10, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: calc(1.5rem - 1px);
    z-index: -1;
  }
</style>
<link rel="stylesheet" href="/index.css">
</head>
<body class="min-h-screen overflow-x-hidden custom-scrollbar">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
